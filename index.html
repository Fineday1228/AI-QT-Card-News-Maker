<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Quantec 카드뉴스 생성기</title>
    <link rel="stylesheet" href="./styles.css?v=20260622-four-step-copy" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="카드뉴스 입력">
        <div class="brand-row">
          <div class="brand-heading">
            <img id="headerBrandLogo" class="header-logo is-visible" src="./ai-quantec-header-logo.png" alt="AI Quantec 로고" />
            <p id="headerBrandFallback" class="eyebrow is-hidden">브랜드 로고</p>
            <h1>카드뉴스 생성기</h1>
          </div>
          <span class="status-pill" id="statusPill">대기</span>
        </div>

        <label class="field">
          <span>세미나 사진</span>
          <div class="drop-zone" id="imageDropZone">
            <input id="imageInput" type="file" accept="image/*" multiple />
            <div class="drop-zone-copy">
              <strong>사진을 끌어다 놓거나 파일을 선택하세요</strong>
              <small id="imageFileSummary">선택된 사진 없음</small>
            </div>
          </div>
        </label>

        <section class="copy-editor" aria-label="카드 문구 입력">
          <div class="copy-editor-head">
            <p class="eyebrow">Copy</p>
            <h2>4단계 카드 문구</h2>
          </div>

          <article class="copy-step">
            <h3>1. 행사개요</h3>
            <label class="field">
              <span>1장 제목</span>
              <input id="cardTitle1" type="text" value="AI 알고리즘 투자전략 세미나" />
            </label>
            <label class="field">
              <span>1장 본문</span>
              <textarea id="cardBody1" class="markup-input" rows="5" placeholder="1장에 들어갈 본문을 입력하세요."></textarea>
            </label>
            <div class="markup-toolbar" data-target="cardBody1">
              <button type="button" data-markup="bold">굵게</button>
              <button type="button" data-markup="green">그린</button>
              <button type="button" data-markup="blue">블루</button>
              <button type="button" data-markup="bold-green">굵은 그린</button>
              <button type="button" data-markup="bold-blue">굵은 블루</button>
            </div>
          </article>

          <article class="copy-step">
            <h3>2. 현장스케치</h3>
            <label class="field">
              <span>2장 제목</span>
              <input id="cardTitle2" type="text" value="현장 스케치" />
            </label>
            <label class="field">
              <span>2장 본문</span>
              <textarea id="cardBody2" class="markup-input" rows="5" placeholder="2장에 들어갈 본문을 입력하세요."></textarea>
            </label>
            <div class="markup-toolbar" data-target="cardBody2">
              <button type="button" data-markup="bold">굵게</button>
              <button type="button" data-markup="green">그린</button>
              <button type="button" data-markup="blue">블루</button>
              <button type="button" data-markup="bold-green">굵은 그린</button>
              <button type="button" data-markup="bold-blue">굵은 블루</button>
            </div>
          </article>

          <article class="copy-step">
            <h3>3. 투자 인사이트</h3>
            <label class="field">
              <span>3장 제목</span>
              <input id="cardTitle3" type="text" value="실전 투자 인사이트" />
            </label>
            <label class="field">
              <span>3장 본문</span>
              <textarea id="cardBody3" class="markup-input" rows="5" placeholder="3장에 들어갈 본문을 입력하세요."></textarea>
            </label>
            <div class="markup-toolbar" data-target="cardBody3">
              <button type="button" data-markup="bold">굵게</button>
              <button type="button" data-markup="green">그린</button>
              <button type="button" data-markup="blue">블루</button>
              <button type="button" data-markup="bold-green">굵은 그린</button>
              <button type="button" data-markup="bold-blue">굵은 블루</button>
            </div>
          </article>

          <article class="copy-step">
            <h3>4. 브랜드 마무리</h3>
            <label class="field">
              <span>4장 제목</span>
              <input id="cardTitle4" type="text" value="AI Quantec" />
            </label>
            <label class="field">
              <span>4장 본문</span>
              <textarea id="cardBody4" class="markup-input" rows="5" placeholder="4장에 들어갈 본문을 입력하세요."></textarea>
            </label>
            <div class="markup-toolbar" data-target="cardBody4">
              <button type="button" data-markup="bold">굵게</button>
              <button type="button" data-markup="green">그린</button>
              <button type="button" data-markup="blue">블루</button>
              <button type="button" data-markup="bold-green">굵은 그린</button>
              <button type="button" data-markup="bold-blue">굵은 블루</button>
            </div>
          </article>
        </section>

        <label class="field">
          <span>브랜드 로고 파일</span>
          <input id="brandLogoInput" type="file" accept="image/*" />
        </label>

        <label class="field check-row">
          <input id="partnerLogoToggle" type="checkbox" />
          <span>협력사 로고 삽입</span>
        </label>

        <label class="field logo-field" id="partnerLogoField">
          <span>협력사 로고 파일</span>
          <input id="partnerLogoInput" type="file" accept="image/*" />
        </label>

        <div class="action-row">
          <button id="generateBtn" class="primary-btn" type="button">생성</button>
          <button id="sampleBtn" class="secondary-btn" type="button">샘플 생성</button>
          <button id="downloadAllBtn" class="secondary-btn" type="button" disabled>전체 다운로드</button>
        </div>

        <div class="note-box">
          <strong>강조 문법</strong>
          <p>선택한 단어에 굵게, 그린, 블루, 굵은 그린, 굵은 블루 효과를 줄 수 있습니다.</p>
        </div>
      </section>

      <section class="preview-panel" aria-label="카드뉴스 미리보기">
        <div class="preview-header">
          <div>
            <p class="eyebrow">Preview</p>
            <h2>4장 카드뉴스</h2>
          </div>
          <button id="downloadCollageBtn" class="secondary-btn" type="button" disabled>콜라주 다운로드</button>
        </div>

        <div class="card-grid" id="cardGrid">
          <article class="empty-card">1</article>
          <article class="empty-card">2</article>
          <article class="empty-card">3</article>
          <article class="empty-card">4</article>
        </div>

        <canvas id="collageCanvas" width="2400" height="2400" hidden></canvas>
      </section>
    </main>

    <script src="./app.js?v=20260622-four-step-copy"></script>
  </body>
</html>
